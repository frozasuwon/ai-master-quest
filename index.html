function RadarChart({ scores, size = 220 }) {
  const labels = ["A","B","C","D","E","F"];
  const cx = size/2, cy = size/2, r = size/2 - 30;
  const n = 6;
  const getPoint = (i, val) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dist = (val / 5) * r;
    return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
  };
  const rings = [1,2,3,4,5];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {rings.map(ring => (
        <polygon key={ring} points={Array.from({length:n},(_,i)=>getPoint(i,ring).join(",")).join(" ")}
          fill="none" stroke="#4b5563" strokeWidth={ring===5?"1.5":"0.5"} opacity={0.4}/>
      ))}
      {Array.from({length:n},(_,i)=>{
        const [x,y] = getPoint(i,5);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#4b5563" strokeWidth="0.5" opacity={0.3}/>;
      })}
      {scores.some(s=>s>0) && (
        <polygon points={scores.map((s,i)=>getPoint(i,s||0).join(",")).join(" ")}
          fill="rgba(99,102,241,0.25)" stroke="#818cf8" strokeWidth="2"/>
      )}
      {scores.map((s,i)=>{
        if(!s) return null;
        const [x,y] = getPoint(i,s);
        return <circle key={i} cx={x} cy={y} r={4} fill="#818cf8"/>;
      })}
      {labels.map((l,i)=>{
        const [x,y] = getPoint(i,5.8);
        return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
          fill="#d1d5db" fontSize="13" fontWeight="700">{l}</text>;
      })}
    </svg>
  );
}

  const drawReportToCanvas = () => {
    const W = 800, PAD = 40, LINE = 22, SEC = 16;
    const lines = [];
    const addLine = (text, opts = {}) => lines.push({ text, ...opts });
    const addGap = (h = 10) => lines.push({ gap: h });

    addLine("AI 교육 마스터 여정 — 나의 성장 보고서", { size: 22, color: "#e0e7ff", bold: true, align: "center" });

    STATIONS.forEach(s => {

      if (s.inputType === "multi_entry") {

        if (s.question) addLine(`Q: ${s.question}`, { size: 12, color: "#fbbf24" });
        if (entries.length > 0) entries.forEach((e, i) => addLine(`  #${i + 1}: ${e}`, { size: 12, color: "#c4b5fd" }));
        else addLine("  (미작성)", { size: 12, color: "#4b5563" });
      } else if (s.inputType === "textarea") {
        if (s.question) addLine(`Q: ${s.question}`, { size: 12, color: "#fbbf24" });
        addLine(`  ${answers[s.id] || "(미작성)"}`, { size: 12, color: answers[s.id] ? "#c4b5fd" : "#4b5563" });
      } else if (s.inputType === "reflection_table") {
        (s.tableRows || []).forEach((row, i) => {
          const val = tableAnswers[`${s.id}-${i}`] || "(미작성)";
          addLine(`  ${row.label}: ${val}`, { size: 12, color: val !== "(미작성)" ? "#c4b5fd" : "#4b5563" });
        });
      } else if (s.inputType === "competency_rating") {
        (s.ratings || []).forEach(r => {
          addLine(`  ${r.code}. ${r.name}: ${ratings[r.code] || "-"}점`, { size: 12, color: ratings[r.code] ? "#c4b5fd" : "#4b5563" });
        });
      } else if (s.inputType === "constellation") {
        (s.fields || []).forEach(f => {
          addLine(`  ${f.label}: ${constellationFields[f.id] || "(미작성)"}`, { size: 12, color: constellationFields[f.id] ? "#c4b5fd" : "#4b5563" });
        });
      } else if (s.inputType === "kpt") {
        ["keep", "problem", "try"].forEach(k => {
          const label = k.charAt(0).toUpperCase() + k.slice(1);
          addLine(`  [${label}]`, { size: 12, color: k === "keep" ? "#22c55e" : k === "problem" ? "#f59e0b" : "#3b82f6", bold: true });
          if ((kpt[k] || []).length > 0) kpt[k].forEach((e, i) => addLine(`    #${i + 1}: ${e}`, { size: 12, color: "#c4b5fd" }));
          else addLine("    (미작성)", { size: 12, color: "#4b5563" });
        });
      } else if (s.inputType === "before_after") {
        (s.rows || []).forEach((row, i) => {
          addLine(`  [${row.label}]`, { size: 12, color: "#e0e7ff", bold: true });
          const entries = beforeAfter[i] || [];
          if (entries.length > 0) entries.forEach((e, j) => addLine(`    #${j + 1}  Before: ${e.before || "-"}  →  After: ${e.after || "-"}`, { size: 11, color: "#c4b5fd" }));
          else addLine("    (미작성)", { size: 12, color: "#4b5563" });
        });
      }
      addGap(SEC);
    });

    addGap(10);
    addLine(badges.size >= 12 ? "🏆 축하합니다! AI 교육 마스터 달성!" : `아직 ${12 - badges.size}개의 뱃지가 남아 있습니다.`, { size: 14, color: "#fbbf24", bold: true, align: "center" });

    // Calculate height
    let totalH = PAD * 2;
    lines.forEach(l => { totalH += l.gap || (l.size || 14) + 8 + (l.bg ? 10 : 0); });

    // Wrap long lines and recalc
    const wrappedLines = [];
    const canvas0 = document.createElement("canvas");
    const ctx0 = canvas0.getContext("2d");
    const maxTextW = W - PAD * 2 - 20;

    lines.forEach(l => {
      if (l.gap) { wrappedLines.push(l); return; }
      ctx0.font = `${l.bold ? "bold " : ""}${l.size || 14}px 'Apple SD Gothic Neo', sans-serif`;
      const words = (l.text || "").split("");
      let line = "";
      const sublines = [];
      for (const char of words) {
        if (ctx0.measureText(line + char).width > maxTextW) {
          sublines.push(line);
          line = char;
        } else line += char;
      }
      if (line) sublines.push(line);
      sublines.forEach((sl, si) => wrappedLines.push({ ...l, text: sl, bg: si === 0 ? l.bg : undefined }));
    });

    totalH = PAD * 2;
    wrappedLines.forEach(l => { totalH += l.gap || (l.size || 14) + 8 + (l.bg ? 10 : 0); });

    const dpr = 2;
    const canvas = document.createElement("canvas");
    canvas.width = W * dpr;
    canvas.height = totalH * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    // Background
    ctx.fillStyle = "#0f0a1e";
    ctx.fillRect(0, 0, W, totalH);
    ctx.fillStyle = "#1e1b4b";
    const rr = 16;
    ctx.beginPath();
    ctx.moveTo(PAD - 10 + rr, PAD - 10);
    ctx.arcTo(W - PAD + 10, PAD - 10, W - PAD + 10, totalH - PAD + 10, rr);
    ctx.arcTo(W - PAD + 10, totalH - PAD + 10, PAD - 10, totalH - PAD + 10, rr);
    ctx.arcTo(PAD - 10, totalH - PAD + 10, PAD - 10, PAD - 10, rr);
    ctx.arcTo(PAD - 10, PAD - 10, W - PAD + 10, PAD - 10, rr);
    ctx.fill();

    let y = PAD;
    wrappedLines.forEach(l => {
      if (l.gap) { y += l.gap; return; }
      const sz = l.size || 14;
      if (l.bg) {
        ctx.fillStyle = l.bg;
        ctx.fillRect(PAD, y - 2, W - PAD * 2, sz + 12);
        y += 5;
      }
      ctx.font = `${l.bold ? "bold " : ""}${sz}px 'Apple SD Gothic Neo', sans-serif`;
      ctx.fillStyle = l.color || "#e0e7ff";
      const x = l.align === "center" ? W / 2 : PAD + 10;
      ctx.textAlign = l.align || "left";
      ctx.fillText(l.text || "", x, y + sz);
      y += sz + 8;
    });
    ctx.textAlign = "left";
    return canvas;
  };

  const saveAsPdf = () => {
    setSaving("pdf");
    setTimeout(() => {
      try {
        const canvas = drawReportToCanvas();
        // Get JPEG data
        const jpegDataUrl = canvas.toDataURL("image/jpeg", 0.92);
        const jpegBase64 = jpegDataUrl.split(",")[1];
        const jpegBytes = atob(jpegBase64);
        const jpegLen = jpegBytes.length;

        const imgW = canvas.width;
        const imgH = canvas.height;

        // PDF page size: fit image to A4 width (595.28pt), keep aspect ratio
        const pageW = 595.28;
        const scale = pageW / imgW;
        const pageH = Math.max(imgH * scale, 841.89);
        const drawW = pageW;
        const drawH = imgH * scale;

        // Build PDF manually
        const offsets = [];
        let pdf = "%PDF-1.4\n";

        // Obj 1: Catalog
        offsets.push(pdf.length);
        pdf += "1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n";

        // Obj 2: Pages
        offsets.push(pdf.length);
        pdf += "2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n";

        // Obj 3: Page
        offsets.push(pdf.length);
        pdf += `3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW.toFixed(2)} ${pageH.toFixed(2)}] /Contents 4 0 R /Resources << /XObject << /Img0 5 0 R >> >> >>\nendobj\n`;

        // Obj 4: Contents stream (draw image)
        const contentStream = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} 0 ${(pageH - drawH).toFixed(2)} cm\n/Img0 Do\nQ\n`;
        offsets.push(pdf.length);
        pdf += `4 0 obj\n<< /Length ${contentStream.length} >>\nstream\n${contentStream}endstream\nendobj\n`;

        // Obj 5: Image XObject - we need to write this as binary
        // First build the header part as string
        const imgHeader = `5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imgW} /Height ${imgH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegLen} >>\nstream\n`;
        const imgFooter = "\nendstream\nendobj\n";

        // Convert text part to bytes
        const encoder = new TextEncoder();
        const pdfTextBytes = encoder.encode(pdf);
        const imgHeaderBytes = encoder.encode(imgHeader);
        const imgFooterBytes = encoder.encode(imgFooter);

        // Image object offset
        const imgObjOffset = pdfTextBytes.length;

        // Build JPEG byte array
        const jpegArray = new Uint8Array(jpegLen);
        for (let i = 0; i < jpegLen; i++) jpegArray[i] = jpegBytes.charCodeAt(i);

        // Build xref
        const xrefOffset = imgObjOffset + imgHeaderBytes.length + jpegLen + imgFooterBytes.length;

        // Recalculate offsets for binary-aware positions
        // offsets[0..3] are text-based, offset[4] = imgObjOffset
        const finalOffsets = offsets.map(o => o); // 0-based text offsets are same as byte offsets for ASCII
        finalOffsets.push(imgObjOffset);

        let xref = "xref\n0 6\n";
        xref += "0000000000 65535 f \n";
        for (let i = 0; i < 5; i++) {
          xref += String(finalOffsets[i]).padStart(10, "0") + " 00000 n \n";
        }
        xref += "trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n" + xrefOffset + "\n%%EOF";

        const xrefBytes = encoder.encode(xref);

        // Combine all parts into single ArrayBuffer
        const totalLen = pdfTextBytes.length + imgHeaderBytes.length + jpegLen + imgFooterBytes.length + xrefBytes.length;
        const pdfBuffer = new Uint8Array(totalLen);
        let pos = 0;
        pdfBuffer.set(pdfTextBytes, pos); pos += pdfTextBytes.length;
        pdfBuffer.set(imgHeaderBytes, pos); pos += imgHeaderBytes.length;
        pdfBuffer.set(jpegArray, pos); pos += jpegLen;
        pdfBuffer.set(imgFooterBytes, pos); pos += imgFooterBytes.length;
        pdfBuffer.set(xrefBytes, pos);

        // Download
        const blob = new Blob([pdfBuffer], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `AI교육마스터_성장보고서_${"2026-07-19"}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) { console.error(e); }
      setSaving(null);

                if (!analysis) return (
                  <div style={{padding:16,borderRadius:10,background:"#13102b",border:"1px dashed #312e81",textAlign:"center",marginBottom:16}}>
                    <div style={{color:"#6b7280",fontSize:13}}>⬅ 이전 페이지에서 A~F 역량 점수를 먼저 체크해주세요</div>
                  </div>
                );
                return (
                  <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #7c3aed44",marginBottom:16,animation:"fadeIn 0.5s"}}>
                    <div style={{padding:"14px 16px",background:"linear-gradient(135deg,#312e81,#1e1b4b)",textAlign:"center"}}>
                      <div style={{fontSize:32,marginBottom:4}}>{analysis.constellation.split(" ")[0]}</div>
                      <div style={{color:"#fbbf24",fontSize:18,fontWeight:800}}>{analysis.constellation}</div>
                      <div style={{color:"#a5b4fc",fontSize:11,marginTop:4}}>패턴: {analysis.pattern} · 평균 {analysis.avg}점</div>
                    </div>
                    <div style={{padding:16,background:"#13102b"}}>
                      <p style={{color:"#e0e7ff",fontSize:13,lineHeight:1.7,margin:"0 0 12px"}}>{analysis.desc}</p>
                      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                        {analysis.strongCodes.length > 0 && (
                          <div style={{flex:1,minWidth:120,padding:10,borderRadius:8,background:"#22c55e15",border:"1px solid #22c55e33"}}>
                            <div style={{color:"#22c55e",fontSize:11,fontWeight:700,marginBottom:4}}>💪 강점 역량</div>
                            {analysis.strongCodes.map(c=>(
                              <div key={c} style={{color:"#e0e7ff",fontSize:13,fontWeight:600}}>{c} — {COMP_NAMES[c]}</div>
                            ))}
                          </div>
                        )}
                        {analysis.weakCodes.length > 0 && (
                          <div style={{flex:1,minWidth:120,padding:10,borderRadius:8,background:"#f59e0b15",border:"1px solid #f59e0b33"}}>
                            <div style={{color:"#f59e0b",fontSize:11,fontWeight:700,marginBottom:4}}>🌱 성장 역량</div>
                            {analysis.weakCodes.map(c=>(
                              <div key={c} style={{color:"#e0e7ff",fontSize:13,fontWeight:600}}>{c} — {COMP_NAMES[c]}</div>
                            ))}
                          </div>
                        )}
                      </div>
                      <div style={{padding:10,borderRadius:8,background:"#6366f115",border:"1px solid #6366f133"}}>
                        <div style={{color:"#a5b4fc",fontSize:11,fontWeight:700,marginBottom:4}}>💡 성장 제안</div>
                        <div style={{color:"#c4b5fd",fontSize:13,lineHeight:1.6}}>{analysis.advice}</div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Input fields */}
              {station.fields.map(f => (
                <div key={f.id} style={{marginBottom:12}}>
                  <label style={{color:"#a5b4fc",fontSize:13,fontWeight:700,display:"inline",marginBottom:4}}>
                    {f.label}
                    {f.id === "strength" && <span style={{color:"#7c8db5",fontSize:11,fontWeight:400}}> (동점이면 가장 강점이라 생각되는 것을 선택해주세요)</span>}
                    {f.id === "weakness" && <span style={{color:"#7c8db5",fontSize:11,fontWeight:400}}> (동점이면 가장 보완이 필요하다고 생각되는 것을 선택해주세요)</span>}
                  </label>
                  {f.id !== "reflection" ? (
                    <div>
                      <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                        {[{c:"A",n:"교육 이해"},{c:"B",n:"윤리적 실천"},{c:"C",n:"수업·학습자 분석"},{c:"D",n:"설계"},{c:"E",n:"실행"},{c:"F",n:"평가"}].map(item=>(
                          <button key={item.c} onClick={()=>setCf({...constellationFields,[f.id]:`${item.c} — ${item.n}`})}
                            style={{padding:"6px 10px",borderRadius:6,border:"1px solid #312e81",cursor:"pointer",fontSize:12,
                              background:constellationFields[f.id]?.startsWith(item.c)?"#7c3aed":"#1e1b4b",
                              color:constellationFields[f.id]?.startsWith(item.c)?"#fff":"#a5b4fc",transition:"all 0.2s"}}>
                            {item.c} {item.n}
                          </button>
                        ))}
                      </div>
                      <input value={constellationFields[f.id]||""} readOnly
                        placeholder={f.placeholder}
                        style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"2px solid #312e81",background:"#13102b",color:"#e0e7ff",fontSize:14}}/>
                    </div>
                  ) : (
                    <input value={constellationFields[f.id]||""} onChange={e=>setCf({...constellationFields,[f.id]:e.target.value})}
                      placeholder={f.placeholder}
                      style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"2px solid #312e81",background:"#13102b",color:"#e0e7ff",fontSize:14}}/>
                  )}
                </div>
              ))}
            </div>
          )}

          {station.inputType === "kpt" && (
            <div style={{marginBottom:20}}>
              {[{key:"keep",label:"Keep",emoji:"💚",color:"#22c55e",hint:"잘된 것·이어갈 것"},
                {key:"problem",label:"Problem",emoji:"🟠",color:"#f59e0b",hint:"아쉬운 것·문제"},
                {key:"try",label:"Try",emoji:"🔵",color:"#3b82f6",hint:"새로 시도할 것"}].map(item => (
                <div key={item.key} style={{marginBottom:18}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <span style={{fontSize:16}}>{item.emoji}</span>
                    <span style={{color:item.color,fontSize:15,fontWeight:800}}>{item.label}</span>
                    <span style={{color:"#6b7280",fontSize:11}}>— {item.hint}</span>
                  </div>
                  {/* Existing entries */}
                  {(kpt[item.key]||[]).map((entry,i) => (
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6,padding:"8px 12px",borderRadius:8,background:"#13102b",border:`1px solid ${item.color}33`}}>
                      <span style={{color:item.color,fontSize:12,fontWeight:700,marginTop:1}}>#{i+1}</span>
                      <p style={{color:"#e0e7ff",fontSize:13,lineHeight:1.5,margin:0,flex:1,whiteSpace:"pre-wrap"}}>{entry}</p>
                      <button onClick={()=>{const arr=[...(kpt[item.key]||[])];arr.splice(i,1);setKpt({...kpt,[item.key]:arr})}}
                        style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14,padding:"0 4px",flexShrink:0}}>✕</button>
                    </div>
                  ))}
                  <textarea value={kptInput[item.key]||""} onChange={e=>setKptInput({...kptInput,[item.key]:e.target.value})}
                    placeholder={`${item.hint}을 적어보세요...`}
                    style={{width:"100%",minHeight:60,padding:12,borderRadius:10,border:`2px solid ${item.color}33`,background:"#13102b",color:"#e0e7ff",fontSize:14,lineHeight:1.6,resize:"vertical"}}/>
                  <button onClick={()=>{
                    if((kptInput[item.key]||"").trim()){
                      setKpt({...kpt,[item.key]:[...(kpt[item.key]||[]),kptInput[item.key].trim()]});
                      setKptInput({...kptInput,[item.key]:""});
                    }
                  }} style={{
                    marginTop:6,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
                    color:"#fff",background:(kptInput[item.key]||"").trim()?item.color:"#374151",
                    transition:"all 0.2s",width:"100%"
                  }}>
                    ✓ 확인
                  </button>
                </div>
              ))}
            </div>
          )}

          {station.inputType === "before_after" && (
            <div style={{marginBottom:20}}>
              {station.rows.map((row, i) => (
                <div key={i} style={{marginBottom:18,background:"#13102b",padding:14,borderRadius:10,border:"1px solid #312e81"}}>
                  <div style={{color:"#e0e7ff",fontSize:14,fontWeight:700,marginBottom:10}}>{row.label}</div>
                  {/* Existing entries */}
                  {(beforeAfter[i]||[]).map((entry,j) => (
                    <div key={j} style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,marginBottom:6,padding:"8px 10px",borderRadius:8,background:"#1e1b4b",border:"1px solid #312e81"}}>
                      <div><span style={{color:"#f87171",fontSize:10,fontWeight:600}}>Before</span><div style={{color:"#e0e7ff",fontSize:12,lineHeight:1.4,marginTop:2}}>{entry.before}</div></div>
                      <div><span style={{color:"#34d399",fontSize:10,fontWeight:600}}>After</span><div style={{color:"#e0e7ff",fontSize:12,lineHeight:1.4,marginTop:2}}>{entry.after}</div></div>
                      <button onClick={()=>{const arr=[...(beforeAfter[i]||[])];arr.splice(j,1);setBa({...beforeAfter,[i]:arr})}}
                        style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14,padding:"0 2px",alignSelf:"start"}}>✕</button>
                    </div>
                  ))}
                  {/* New entry input */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div>
                      <div style={{color:"#f87171",fontSize:11,fontWeight:600,marginBottom:4}}>Before (이전)</div>
                      <textarea value={baInput[`before-${i}`]||""} onChange={e=>setBaInput({...baInput,[`before-${i}`]:e.target.value})}
                        placeholder={row.beforeHint||"이전 모습..."}
                        style={{width:"100%",minHeight:60,padding:10,borderRadius:8,border:"1px solid #312e81",background:"#1e1b4b",color:"#e0e7ff",fontSize:13,resize:"vertical"}}/>
                    </div>
                    <div>
                      <div style={{color:"#34d399",fontSize:11,fontWeight:600,marginBottom:4}}>After (이후)</div>
                      <textarea value={baInput[`after-${i}`]||""} onChange={e=>setBaInput({...baInput,[`after-${i}`]:e.target.value})}
                        placeholder={row.afterHint||"이후 변화..."}
                        style={{width:"100%",minHeight:60,padding:10,borderRadius:8,border:"1px solid #312e81",background:"#1e1b4b",color:"#e0e7ff",fontSize:13,resize:"vertical"}}/>
                    </div>
                  </div>
                  <button onClick={()=>{
                    const b = (baInput[`before-${i}`]||"").trim();
                    const a = (baInput[`after-${i}`]||"").trim();
                    if(b||a){
                      setBa({...beforeAfter,[i]:[...(beforeAfter[i]||[]),{before:b,after:a}]});
                      setBaInput({...baInput,[`before-${i}`]:"",[`after-${i}`]:""});
                    }
                  }} style={{
                    marginTop:8,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
                    color:"#fff",background:((baInput[`before-${i}`]||"").trim()||(baInput[`after-${i}`]||"").trim())?"linear-gradient(135deg,#ec4899,#a855f7)":"#374151",
                    transition:"all 0.2s",width:"100%"
                  }}>
                    ✓ 확인
                  </button>
                </div>
              ))}
            </div>
          )}

          {/* Navigation */}
          <div style={{display:"flex",gap:10,marginBottom:32}}>
            {currentStation > 0 && (
              <button onClick={()=>setCurrentStation(currentStation-1)} style={{
                flex:1,padding:"14px",borderRadius:10,border:"2px solid #312e81",cursor:"pointer",
                background:"transparent",color:"#a5b4fc",fontSize:14,fontWeight:600
              }}>← 이전</button>
            )}
            <button onClick={completeStation} style={{
              flex:2,padding:"14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:15,fontWeight:700,
              color:"#fff",background:`linear-gradient(135deg,${station.color},${station.color}cc)`,
              boxShadow:`0 4px 15px ${station.color}33`
            }}>
              {badges.has(station.id) ? (currentStation < STATIONS.length-1 ? "다음 센터 →" : "지도로 돌아가기") :
                `${station.badge} 뱃지 획득하고 다음으로 →`}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Report page ──
  if (page === "report") {
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0f0a1e,#1a1145)",padding:"24px 16px",fontFamily:"'Pretendard','Apple SD Gothic Neo',sans-serif"}}>
        <style>{`* { box-sizing:border-box; } @media print { .no-print{display:none!important;} }`}</style>
        <div style={{maxWidth:650,margin:"0 auto"}}>
          <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <button onClick={()=>setPage("map")} style={{background:"none",border:"none",color:"#a5b4fc",fontSize:14,cursor:"pointer"}}>← 지도로</button>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveAsImage} disabled={saving==="image"} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:saving?"wait":"pointer",fontSize:13,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#7c3aed,#6366f1)",opacity:saving==="image"?0.6:1}}>
                {saving==="image" ? "⏳ 저장 중..." : "🖼️ 그림으로 저장"}
              </button>
              <button onClick={saveAsPdf} disabled={saving==="pdf"} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:saving?"wait":"pointer",fontSize:13,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#ef4444,#f59e0b)",opacity:saving==="pdf"?0.6:1}}>
                {saving==="pdf" ? "⏳ 저장 중..." : "📄 PDF로 저장"}
              </button>
            </div>
          </div>

          <div ref={reportRef} style={{background:"#1e1b4b",borderRadius:16,padding:28,border:"1px solid #312e81"}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:48,marginBottom:8}}>{badges.size >= 12 ? "🏆" : "📋"}</div>
              <h1 style={{color:"#e0e7ff",fontSize:24,fontWeight:800,margin:"0 0 6px"}}>나의 성장 보고서</h1>
              <p style={{color:"#a5b4fc",fontSize:13,margin:0}}>AI 교육 마스터 여정 · {"2026. 07. 19."}</p>
              <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:12,flexWrap:"wrap"}}>
                {STATIONS.map(s => (
                  <span key={s.id} style={{fontSize:20,opacity:badges.has(s.id)?1:0.2,transition:"opacity 0.3s"}}>{s.badge}</span>
                ))}
              </div>
              <div style={{color:"#a78bfa",fontSize:13,marginTop:8,fontWeight:600}}>🏅 {badges.size}/12 뱃지</div>
            </div>

            {STATIONS.map(s => {
              let content = null;
              if (s.inputType === "multi_entry") {
                const entries = multiEntries[s.id] || [];
                content = entries.length > 0 ? (
                  <div>
                    {s.question && <div style={{color:"#fbbf24",fontSize:12,marginBottom:6}}>Q: {s.question}</div>}
                    {entries.map((e, i) => (
                      <div key={i} style={{display:"flex",gap:6,marginBottom:4,fontSize:13}}>
                        <span style={{color:"#a78bfa",fontWeight:700}}>#{i+1}</span>
                        <span style={{color:"#e0e7ff",whiteSpace:"pre-wrap"}}>{e}</span>
                      </div>
                    ))}
                  </div>
                ) : <div style={{color:"#4b5563",fontSize:13,fontStyle:"italic"}}>미작성</div>;
              } else if (s.inputType === "textarea") {
                content = answers[s.id] ? (
                  <div>
                    {s.question && <div style={{color:"#fbbf24",fontSize:12,marginBottom:4}}>Q: {s.question}</div>}
                    <div style={{color:"#e0e7ff",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{answers[s.id]}</div>
                  </div>
                ) : <div style={{color:"#4b5563",fontSize:13,fontStyle:"italic"}}>미작성</div>;
              } else if (s.inputType === "reflection_table") {
                content = (
                  <div>{s.tableRows.map((row,i) => (
                    <div key={i} style={{display:"flex",gap:8,marginBottom:4,fontSize:13}}>
                      <span style={{color:"#a5b4fc",fontWeight:600,minWidth:100}}>{row.label}</span>
                      <span style={{color:tableAnswers[`${s.id}-${i}`]?"#e0e7ff":"#4b5563"}}>{tableAnswers[`${s.id}-${i}`]||"미작성"}</span>
                    </div>
                  ))}</div>
                );
              } else if (s.inputType === "competency_rating") {
                content = (
                  <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {s.ratings.map(r => (
                        <div key={r.code} style={{textAlign:"center"}}>
                          <div style={{color:"#a5b4fc",fontSize:12,fontWeight:700}}>{r.code}</div>
                          <div style={{color:ratings[r.code]?"#e0e7ff":"#4b5563",fontSize:18,fontWeight:800}}>{ratings[r.code]||"-"}</div>
                        </div>
                      ))}
                    </div>
                    <RadarChart scores={[ratings.A,ratings.B,ratings.C,ratings.D,ratings.E,ratings.F]} size={140} />
                  </div>
                );
              } else if (s.inputType === "constellation") {
                content = (
                  <div>{s.fields.map(f => (
                    <div key={f.id} style={{display:"flex",gap:8,marginBottom:4,fontSize:13}}>
                      <span style={{color:"#a5b4fc",fontWeight:600,minWidth:80}}>{f.label}:</span>
                      <span style={{color:constellationFields[f.id]?"#e0e7ff":"#4b5563"}}>{constellationFields[f.id]||"미작성"}</span>
                    </div>
                  ))}</div>
                );
              } else if (s.inputType === "kpt") {
                content = (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                    {[{key:"keep",label:"Keep",color:"#22c55e"},{key:"problem",label:"Problem",color:"#f59e0b"},{key:"try",label:"Try",color:"#3b82f6"}].map(item=>(
                      <div key={item.key}>
                        <div style={{color:item.color,fontSize:12,fontWeight:700,marginBottom:4}}>{item.label}</div>
                        {(kpt[item.key]||[]).length > 0 ? kpt[item.key].map((e,i)=>(
                          <div key={i} style={{color:"#e0e7ff",fontSize:12,lineHeight:1.5,marginBottom:3}}>
                            <span style={{color:item.color,fontWeight:700}}>#{i+1}</span> {e}
                          </div>
                        )) : <div style={{color:"#4b5563",fontSize:12}}>미작성</div>}
                      </div>
                    ))}
                  </div>
                );
              } else if (s.inputType === "before_after") {
                content = (
                  <div>{s.rows.map((row,i) => (
                    <div key={i} style={{marginBottom:8}}>
                      <div style={{color:"#e0e7ff",fontSize:13,fontWeight:700,marginBottom:4}}>{row.label}</div>
                      {(beforeAfter[i]||[]).length > 0 ? (beforeAfter[i]).map((e,j)=>(
                        <div key={j} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12,marginBottom:3,paddingLeft:8}}>
                          <div><span style={{color:"#f87171"}}>Before: </span><span style={{color:"#e0e7ff"}}>{e.before||"미작성"}</span></div>
                          <div><span style={{color:"#34d399"}}>After: </span><span style={{color:"#e0e7ff"}}>{e.after||"미작성"}</span></div>
                        </div>
                      )) : <div style={{color:"#4b5563",fontSize:12,paddingLeft:8}}>미작성</div>}
                    </div>
                  ))}</div>
                );
              }

              return (
                <div key={s.id} style={{marginBottom:16,padding:14,borderRadius:10,background:"#13102b",border:"1px solid #312e81"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:18}}>{s.icon}</span>
                    <span style={{color:"#e0e7ff",fontSize:14,fontWeight:700}}>{s.title}</span>
                    <span style={{marginLeft:"auto",fontSize:14}}>{badges.has(s.id)?s.badge:"🔒"}</span>
                  </div>
                  {content}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  return null;
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
